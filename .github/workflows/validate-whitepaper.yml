name: Validate NeuroLabs Whitepaper

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate whitepaper
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate release archive
        run: python scripts/validate_release.py

      - name: Protect immutable releases
        if: github.event_name == 'pull_request'
        run: python scripts/check_release_immutability.py --base-ref "origin/${{ github.base_ref }}"

      - name: Test site build
        run: python scripts/build_site.py
